random_seed: 444

dataset:
  type: &dataset_type "KITTI"
  root_dir: "/data2/local_datasets/KITTI_J/KITTI/object"
  train_split: "train"
  test_split: "val"
  batch_size: 8
  use_3d_center: True
  class_merging: False
  use_dontcare: False
  bbox2d_type: "anno" # 'proj' or 'anno'
  meanshape: False # use predefined anchor or not
  writelist: ["Car"]
  clip_2d: False

  aug_pd: True
  aug_crop: True

  random_flip: 0.5
  random_crop: 0.5
  random_mixup3d: 0.3
  scale: 0.05
  shift: 0.05
  depth_scale: "normal"

  maintain_image_ratio: True
  target_focal_list: [1300, 700, 900, 1100]
  test_focal: 700

model_name: "monoia_car"
model:
  num_classes: 3
  return_intermediate_dec: True
  device: "cuda"
  type: "monoia"
  num_channels: [512, 1024, 2048]
  focal_embedding_path: "/nas2/data/heewon.hong/MonoIA_consistency/focal_list_feat.npy"
  target_focal_list: [1300, 700, 900, 1100]

  # Object-level focal feature transform (off by default -> identical to prior behavior)
  # canonical target is each image's own original (un-augmented) focal - see kitti_dataset.py orig_focal
  use_focal_transform: True
  focal_transform_level: 1
  focal_transform_roi_size: 7

  # Backbone
  backbone: "resnet50"
  train_backbone: True
  num_feature_levels: 4

  # Depth predictor
  mode: LID
  num_depth_bins: 80
  depth_min: 1e-3
  depth_max: 60.0
  use_depth_pos_embed: True

  # Transformer
  with_box_refine: True
  two_stage: False
  use_dab: False
  use_dn: False
  two_stage_dino: False
  init_box: False
  enc_layers: 3
  dec_layers: 3
  hidden_dim: 256
  dim_feedforward: 256
  dropout: 0.1
  nheads: 8
  num_queries: 50
  group_num: 11
  enc_n_points: 4
  dec_n_points: 4
  # DN
  scalar: 5
  label_noise_scale: 0.2
  box_noise_scale: 0.4
  num_patterns: 0
  # Loss
  aux_loss: True

  # Loss coefficients
  cls_loss_coef: 2
  focal_alpha: 0.25

  bbox_loss_coef: 5
  giou_loss_coef: 2
  3dcenter_loss_coef: 10
  dim_loss_coef: 1
  angle_loss_coef: 1
  depth_loss_coef: 1
  depth_map_loss_coef: 1
  region_loss_coef: 1

  # Matcher
  set_cost_class: 2
  set_cost_bbox: 5
  set_cost_giou: 2
  set_cost_3dcenter: 10

optimizer:
  type: "adamw"
  lr: 0.0002
  weight_decay: 0.0001

lr_scheduler:
  type: "step" # 'step' or 'cos'
  warmup: False # 5 epoches, cosine warmup, init_lir=0.00001 in default
  decay_rate: 0.5
  decay_list: [85, 125, 165, 205]

trainer:
  max_epoch: 250
  gpu_ids: "1"
  save_frequency: 1 # checkpoint save interval (in epoch)
  #resume_model: True
  #pretrain_model: path/to/ckpt
  save_path: "outputs/monoia_car/"
  save_all: False # False for only savng the best and latest ckpts
  use_dn: False
  scalar: 5
  label_noise_scale: 0.2
  box_noise_scale: 0.4
  num_patterns: 0
  eval_epoch: 0
  use_consistency_loss: False
  consistency_loss_coef: 0.0
  focal_transform_loss_coef: 0.0

tester:
  type: *dataset_type
  mode: single # 'single' or 'all'; 'all' to evaluate all ckpts in the folder
  checkpoint: 195 # the start ckpt epoch for 'all'
  threshold: 0.2 # confidence filter
  topk: 50
